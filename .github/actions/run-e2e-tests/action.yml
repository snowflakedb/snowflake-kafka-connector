name: Run E2E Tests
description: Run Docker-based end-to-end tests for the Snowflake Kafka Connector

inputs:
  platform:
    description: "Target platform: 'apache' or 'confluent'"
    required: true
  platform-version:
    description: "Platform version (e.g. '2.8.2', '7.8.2')"
    required: true
  snowflake-cloud:
    description: "Snowflake cloud provider: 'AWS', 'GCP', or 'AZURE'"
    required: true
  java-version:
    description: "Java version for Apache Kafka (e.g. '11', '17'). Ignored for Confluent."
    required: false
    default: '11'
  marker-filter:
    description: "pytest -m expression controlling which tests run (e.g. 'compatibility' or 'not compatibility and not schema_evolution and not correctness and not pressure')"
    required: false
    default: 'not pressure'
  test-group:
    description: "Short label for this test group used in artifact names (e.g. 'core', 'compatibility', 'schema_and_correctness')"
    required: false
    default: 'default'
  pressure:
    description: "Run pressure/stress tests instead of regular tests"
    required: false
    default: 'false'
  with-mitmproxy:
    description: "Enable mitmproxy reverse proxy for fault injection tests"
    required: false
    default: 'false'
  jmx:
    description: "Enable JMX metrics scraping via the Jolokia javaagent (sets KAFKA_OPTS so the connector JVM exposes MBeans on port 8778)"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Log in to GHCR (for prebuilt Apache Kafka image)
      if: inputs.platform == 'apache'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build protobuf builder image (GitHub Actions layer cache)
      # Prebuild the protobuf builder here so its layers (apt-get, protoc
      # download, git clone, maven builds) are restored from the GHA cache
      # instead of re-fetched from flaky external mirrors on every run. The
      # loaded image is reused by run_tests.sh (PROTOBUF_BUILDER_PREBUILT).
      uses: docker/build-push-action@v6
      with:
        context: test
        file: test/docker/Dockerfile.builder
        tags: protobuf-builder:latest
        load: true
        cache-from: type=gha,scope=protobuf-builder
        cache-to: type=gha,mode=max,scope=protobuf-builder

    - name: Run end-to-end tests
      shell: bash
      working-directory: test
      env:
        SNOWFLAKE_CREDENTIAL_FILE: "${{ github.workspace }}/profile.json"
        PROTOBUF_BUILDER_PREBUILT: 'true'
        PLATFORM: ${{ inputs.platform }}
        PLATFORM_VERSION: ${{ inputs['platform-version'] }}
        SNOWFLAKE_CLOUD: ${{ inputs['snowflake-cloud'] }}
        JAVA_VERSION: ${{ inputs['java-version'] }}
        LOGS_DIR: "${{ github.workspace }}/test-logs"
        MARKER_FILTER: ${{ inputs.pressure == 'true' && 'pressure' || inputs['marker-filter'] }}
        MITMPROXY_FLAG: ${{ inputs['with-mitmproxy'] == 'true' && '--with-mitmproxy' || '' }}
        JMX_FLAG: ${{ inputs.jmx == 'true' && '--jmx' || '' }}
      run: |
        ./run_tests.sh \
          --platform="$PLATFORM" \
          --platform-version="$PLATFORM_VERSION" \
          --cloud="$SNOWFLAKE_CLOUD" \
          --java-version="$JAVA_VERSION" \
          --logs-dir="$LOGS_DIR" \
          $MITMPROXY_FLAG \
          $JMX_FLAG \
          -- -m "$MARKER_FILTER"

    - name: Upload service logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ inputs.platform }}-${{ inputs['platform-version'] }}-${{ inputs['snowflake-cloud'] }}-${{ inputs['test-group'] }}
        path: ${{ github.workspace }}/test-logs/
        retention-days: 14
        if-no-files-found: ignore
