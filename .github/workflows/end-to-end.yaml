name: Kafka Connector end-to-end tests

on:
  push:
    branches: [master, 'release-*']
  pull_request:
    branches: ['**']
  schedule:
    # Nightly run with all jobs, including the soak test.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      run_functional:
        description: 'functional tests'
        type: boolean
        default: false
      run_fault_injection:
        description: 'fault injection tests'
        type: boolean
        default: false
      run_core_legacy:
        description: 'core tests on legacy platforms'
        type: boolean
        default: false
      run_stress:
        description: 'stress tests'
        type: boolean
        default: false
      run_soak_with_chaos:
        description: 'soak + chaos tests'
        type: boolean
        default: false

jobs:
  functional:
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_functional)
    runs-on: ubuntu-22.04
    name: >
      functional
      ${{ matrix.platform }} ${{ matrix.platform_version }},
      ${{ matrix.java_test_version && format('Java {0},', matrix.java_test_version) || '' }}
      ${{ matrix.snowflake_cloud }}
      [${{ matrix.test_group }}]
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── New platforms: full suite split into 3 parallel groups ───────
          - platform: apache
            platform_version: '4.1.1'
            snowflake_cloud: 'AWS'
            java_test_version: '17'
            test_group: compatibility
            marker_filter: 'compatibility and not schema_evolution'
          - platform: apache
            platform_version: '4.1.1'
            snowflake_cloud: 'AWS'
            java_test_version: '17'
            test_group: schema_and_correctness
            marker_filter: 'schema_evolution or correctness'
          - platform: apache
            platform_version: '4.1.1'
            snowflake_cloud: 'AWS'
            java_test_version: '17'
            test_group: core
            marker_filter: 'not compatibility and not schema_evolution and not correctness and not pressure and not soak'

          - platform: confluent
            platform_version: '8.2.0'
            snowflake_cloud: 'AWS'
            test_group: compatibility
            marker_filter: 'compatibility and not schema_evolution'
          - platform: confluent
            platform_version: '8.2.0'
            snowflake_cloud: 'AWS'
            test_group: schema_and_correctness
            marker_filter: 'schema_evolution or correctness'
          - platform: confluent
            platform_version: '8.2.0'
            snowflake_cloud: 'AWS'
            test_group: core
            marker_filter: 'not compatibility and not schema_evolution and not correctness and not pressure and not soak'

    steps:
    - uses: actions/checkout@v4

    - name: Decrypt profile.json in Snowflake Cloud ${{ matrix.snowflake_cloud }}
      run: ./.github/scripts/decrypt_secret.sh ${{ matrix.snowflake_cloud }}
      env:
        SNOWFLAKE_TEST_PROFILE_SECRET: ${{ secrets.SNOWFLAKE_TEST_PROFILE_SECRET }}

    - uses: ./.github/actions/build-connector
      with:
        platform: ${{ matrix.platform }}

    - uses: ./.github/actions/run-e2e-tests
      with:
        platform: ${{ matrix.platform }}
        platform-version: ${{ matrix.platform_version }}
        snowflake-cloud: ${{ matrix.snowflake_cloud }}
        java-version: ${{ matrix.java_test_version || '11' }}
        marker-filter: ${{ matrix.marker_filter }}
        test-group: ${{ matrix.test_group }}

  fault_injection:
    # Exercises error-recovery paths using mitmproxy to inject HTTP 410 responses.
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_fault_injection)
    runs-on: ubuntu-22.04
    name: fault_injection
    permissions:
      packages: read
    steps:
    - uses: actions/checkout@v4

    - name: Decrypt profile.json
      run: ./.github/scripts/decrypt_secret.sh AWS
      env:
        SNOWFLAKE_TEST_PROFILE_SECRET: ${{ secrets.SNOWFLAKE_TEST_PROFILE_SECRET }}

    - uses: ./.github/actions/build-connector
      with:
        platform: apache
        # Pin to the last SDK version that allows plain-HTTP requests; later
        # versions enforce HTTPS-only and reject the http://mitmproxy:8080
        # destination used by these fault-injection tests. Tracking ticket:
        # SNOW-3683451.
        snowpipe-streaming-version: '1.4.0'

    - uses: ./.github/actions/run-e2e-tests
      with:
        platform: apache
        platform-version: '3.9.2'
        snowflake-cloud: AWS
        with-mitmproxy: 'true'
        marker-filter: 'fault_injection'
        test-group: fault-injection

  core_legacy:
    # Runs the core e2e suite on older Kafka platform versions.
    # Skipped on pull_requests to reduce concurrent load on the shared Snowflake test account.
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_core_legacy)
    runs-on: ubuntu-22.04
    name: >
      core_legacy
      ${{ matrix.platform }} ${{ matrix.platform_version }},
      ${{ matrix.java_test_version && format('Java {0},', matrix.java_test_version) || '' }}
      ${{ matrix.snowflake_cloud }}
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Compatibility, schema_evolution and correctness groups are intentionally
          # skipped here — full coverage runs on the new platforms in the `functional` job.
          - platform: apache
            platform_version: '2.8.2'
            snowflake_cloud: 'AWS'
            java_test_version: '11'
          - platform: apache
            platform_version: '3.9.2'
            snowflake_cloud: 'GCP'
            java_test_version: '11'
          - platform: confluent
            platform_version: '6.2.15'
            snowflake_cloud: 'AZURE'
          - platform: confluent
            platform_version: '7.9.3'
            snowflake_cloud: 'AWS'

    steps:
    - uses: actions/checkout@v4

    - name: Decrypt profile.json in Snowflake Cloud ${{ matrix.snowflake_cloud }}
      run: ./.github/scripts/decrypt_secret.sh ${{ matrix.snowflake_cloud }}
      env:
        SNOWFLAKE_TEST_PROFILE_SECRET: ${{ secrets.SNOWFLAKE_TEST_PROFILE_SECRET }}

    - uses: ./.github/actions/build-connector
      with:
        platform: ${{ matrix.platform }}

    - uses: ./.github/actions/run-e2e-tests
      with:
        platform: ${{ matrix.platform }}
        platform-version: ${{ matrix.platform_version }}
        snowflake-cloud: ${{ matrix.snowflake_cloud }}
        java-version: ${{ matrix.java_test_version || '11' }}
        marker-filter: 'not compatibility and not schema_evolution and not correctness and not pressure and not soak'
        test-group: core

  stress:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_stress)
    runs-on: ubuntu-22.04
    name: >
      stress
      ${{ matrix.platform }} ${{ matrix.platform_version }},
      ${{ matrix.snowflake_cloud }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: confluent
            platform_version: '7.6.0'
            snowflake_cloud: 'AWS'
    steps:
    - uses: actions/checkout@v4

    - name: Decrypt profile.json in Snowflake Cloud ${{ matrix.snowflake_cloud }}
      run: ./.github/scripts/decrypt_secret.sh ${{ matrix.snowflake_cloud }}
      env:
        SNOWFLAKE_TEST_PROFILE_SECRET: ${{ secrets.SNOWFLAKE_TEST_PROFILE_SECRET }}

    - uses: ./.github/actions/build-connector
      with:
        platform: ${{ matrix.platform }}

    - uses: ./.github/actions/run-e2e-tests
      env:
        # Less frequent preCommit than default E2E
        CONNECT_OFFSET_FLUSH_INTERVAL_MS: '10000'
      with:
        platform: ${{ matrix.platform }}
        platform-version: ${{ matrix.platform_version }}
        snowflake-cloud: ${{ matrix.snowflake_cloud }}
        pressure: 'true'

  soak_with_chaos:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_soak_with_chaos)
    runs-on: ubuntu-22.04
    name: soak with chaos
    timeout-minutes: 360 # 6 hours (5 hours + buffer) - hard cap from GHA runners
    steps:
    - uses: actions/checkout@v4

    # SYSTEM$STREAMING_CHANNEL_INVALIDATE is not enabled on the AWS CI
    # profile (every test_channel_invalidation case is skipped there on
    # master). The AZURE profile has it, so we point the soak there to
    # actually exercise the recovery path the test is built around.
    - name: Decrypt profile.json
      run: ./.github/scripts/decrypt_secret.sh AZURE
      env:
        SNOWFLAKE_TEST_PROFILE_SECRET: ${{ secrets.SNOWFLAKE_TEST_PROFILE_SECRET }}

    - uses: ./.github/actions/build-connector
      with:
        platform: confluent

    - uses: ./.github/actions/run-e2e-tests
      with:
        platform: confluent
        platform-version: '7.8.0'
        snowflake-cloud: AZURE
        marker-filter: 'soak'
        test-group: soak
        jmx: 'true'
