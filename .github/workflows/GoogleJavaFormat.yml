name: GoogleJavaFormat

on:
  pull_request:
  push:
    branches:
      - master
      - release-3.5

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GoogleJavaFormat
        id: googlejavaformat
        uses: axel-op/googlejavaformat-action@v3
        with:
          skip-commit: true
          version: v1.24.0
          args: "-n --set-exit-if-changed"